<!doctype html>

<head>
<meta charset="utf-8" />

<title>Trắc nghiệm QTDN (28214)</title>
<style>
  :root {
    --bg:#0b0f14; --card:#111826; --muted:#9aa4b2; --text:#e6edf3;
    --border: rgba(255,255,255,.10);
    --ok:#22c55e; --bad:#ef4444; --accent:#60a5fa;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#070a0f, #0b0f14 40%, #070a0f);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
  .wrap{max-width:920px;margin:0 auto;padding:20px}
  .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
  .title{font-weight:800;letter-spacing:.2px}
  .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:14px}
  .pill{border:1px solid var(--border);padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.03)}
  .card{background:rgba(17,24,38,.85);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
  .qtext{font-size:18px;line-height:1.5;margin:0 0 14px}
  .choices{display:grid;gap:10px}
  .btn{width:100%;text-align:left;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);
        padding:12px 12px;border-radius:14px;cursor:pointer;transition:.12s transform,.12s border-color,.12s background}
  .btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.05)}
  .btn:disabled{cursor:not-allowed;opacity:1}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;flex-wrap:wrap}
  .feedback{font-weight:700}
  .ok{color:var(--ok)}
  .bad{color:var(--bad)}
  .small{color:var(--muted);font-size:14px}
  .progress{height:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:999px;overflow:hidden;flex:1;min-width:220px}
  .bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#a78bfa);transition:width .25s}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .ghost{border:1px solid var(--border);background:transparent;color:var(--text);padding:10px 12px;border-radius:14px;cursor:pointer}
  .primary{border:1px solid rgba(96,165,250,.5);background:rgba(96,165,250,.14);color:var(--text);padding:10px 12px;border-radius:14px;cursor:pointer}
  .hint{margin-top:10px;color:var(--muted);font-size:13px}
  .end{text-align:center;padding:26px 10px}
  .end h2{margin:0 0 8px}
  .end .big{font-size:36px;font-weight:900}
</style>
</head>

<script>
const QUESTIONS = [{"id": 1, "q": "Câu 1: Theo luật Doanh nghiệp năm 2014 thì:", "choices": ["Doanh nghiệp là tổ chức kinh tế", "Doanh nghiệp là đơn vị tổ chức sản xuất", "Doanh nghiệp là một cộng đồng người sản xuất", "Doanh nghiệp là một tập hợp các bộ phận"], "correct": 0}, {"id": 2, "q": "Câu 2: Theo quan điểm nào thì doanh nghiệp là một tổ chức?", "choices": ["Quan điểm phát triển", "Quan điểm hệ thống", "Quan điểm luật pháp", "Cả 3 quan điểm trên"], "correct": 2}, {"id": 3, "q": "Câu 3: Quan điểm nào cho rằng: “Doanh nghiệp là một cộng đồng người sản xuất ra của cải” ?", "choices": ["Quan điểm luật pháp", "Quan điểm chức năng", "Quan điểm phát triển", "Quan điểm hệ thống"], "correct": 2}, {"id": 4, "q": "Câu 4: Quan điểm nào cho rằng: “Doanh nghiệp là tập hợp các bộ phận được tổ chức, tác động qua lại và theo đuổi cùng một mục tiêu” ?", "choices": ["Quan điểm hệ thống", "Quan điểm phát triển", "Quan điểm luật pháp", "Cả 3 quan điểm trên"], "correct": 0}, {"id": 5, "q": "Câu 5: Quan điểm nào cho rằng: “Doanh nghiệp sinh ra, phát triển, có thất bại, thành công, có khi vượt qua thời kì nguy kịch nhưng ngược lại có lúc ngừng sản xuất, tiêu vong”?", "choices": ["Quan điểm luật pháp", "Quan điểm hệ thống", "Quan điểm phát triển", "Quan điểm chức năng"], "correct": 2}, {"id": 6, "q": "Câu 6: Quan điểm nào nhấn mạnh vào 4 phân hệ chính sau: sản xuất, thương mại, tổ chức và nhân sự?", "choices": ["Quan điểm luật pháp", "Quan điểm chức năng", "Quan điểm hệ thống", "Quan điểm hệ thống"], "correct": 2}, {"id": 7, "q": "Câu 7: Quan điểm nào cho rằng “Doanh nghiệp cung cấp sản phẩm hàng hóa hoặc dịch vụ ra thị trường để nhận tiền chênh lệch giữa giá bán và giá thành của sản phẩm ấy”?", "choices": ["Quan điểm luật pháp", "Quan điểm chức năng", "Quan điểm phát triển", "Quan điểm hệ thống"], "correct": 1}, {"id": 8, "q": "Câu 8: Quan điểm chức năng đưa ra định nghĩa về doanh nghiệp dựa trên các khía cạnh nào?", "choices": ["Gồm 4 phân hệ: sản xuất, thương mại, tổ chức, dân sự", "Chu kì sống của doanh nghiệp", "Tên riêng, tài sản, trụ sở giao dịch ổn định", "Yếu tố sản xuất"], "correct": 3}, {"id": 9, "q": "Câu 9: Quan điểm luật pháp đưa ra định nghĩa về doanh nghiệp dựa trên các khía cạnh nào?", "choices": ["Gồm 4 phân hệ: sản xuất, thương mại, tổ chức, nhân sự", "Chu kì sống của doanh nghiệp", "Tên riêng, tài sản, trụ sở giao dịch ổn định", "Yếu tố sản xuất"], "correct": 2}, {"id": 10, "q": "Câu 10: Quan điểm hệ thống đưa ra định nghĩa về doanh nghiệp dựa trên các khía cạnh nào?", "choices": ["Gồm 4 phân hệ: sản xuất, thương mại, tổ chức, dân sự", "Chu kì sống của doanh nghiệp", "Tên riêng, tài sản, trụ sở giao dịch ổn định", "Yếu tố sản xuất"], "correct": 0}, {"id": 11, "q": "Câu 11: Quan điểm phát triển đưa ra định nghĩa về doanh nghiệp dựa trên các khía cạnh nào?", "choices": ["Gồm 4 phân hệ: sản xuất, thương mại, tổ chức, dân sự", "Chu kì sống của doanh nghiệp", "Tên riêng, tài sản, trụ sở giao dịch ổn định", "Yếu tố sản xuất"], "correct": 1}, {"id": 12, "q": "Câu 12: Có mấy yếu tố cấu thành nên doanh nghiệp?", "choices": ["3", "5", "7", "8"], "correct": 1}, {"id": 13, "q": "Câu 13: Yếu tố phân phối không có các đặc điểm nào sau đây?", "choices": ["Làm nghĩa vụ với nhà nước", "Lập quỹ cho hoạt động tương lai của doanh nghiệp", "Bán sản phẩm để kiếm lời", "Thanh toán cho các yếu tố sản xuất"], "correct": 2}, {"id": 14, "q": "Câu 14: Yếu tố tài chính có các đặc điểm nào sau đây?", "choices": ["Tạo ra các nguồn lực bằng tiền", "Dịch vụ thương mại mua các yếu tố đầu vào và bán ra kiếm lời ở thị trường", "Các nguồn lực lao động, vốn, thông tin", "A, B và C đều đúng"], "correct": 0}, {"id": 15, "q": "Câu 15: Yếu tố tổ chức không có các đặc điểm nào sau đây?", "choices": ["Làm nghĩa vụ với nhà nước ( phân phối )", "Các nguồn lực lao động, vốn, thông tin ( thông tin)", "Thanh toán các yếu tố sản xuất( phân phối )", "Tập hợp các bộ phận chuyên môn hóa ( tổ chức)"], "correct": 2}, {"id": 16, "q": "Câu 16: Yếu tố sản xuất không có các đặc điểm ầu nguồn nhân sự?", "choices": ["Sự cạnh tranh của thị trường lao động", "Chất lượng lao động", "Ảnh hưởng chính sách tiền lương do nhà nước quy định", "Cả 3 phương án trên"], "correct": 3}, {"id": 306, "q": "Câu 306: Sắp xếp quy trình hoạch định nguồn nhân sự:", "choices": ["Xác định nhu cầu và khả năng nhân sự, đưa chính sách phù hợp, cân đối nhu", "Cân đối nhu cầu và khả năng, xác định nhu cầu và khả năng nhân sự, đưa", "Đưa chính sách phù hợp, cân đối nhu cầu và khả năng, xác định nhu cầu và", "Xác định nhu cầu và khả năng nhân sự, cân đối nhu cầu và khả năng, đưa"], "correct": 3}, {"id": 307, "q": "Câu 307: Đâu là nguồn tuyển chọn nhân sự của doanh nghiệp?", "choices": ["Các trường đào tạo, cơ sở đào tạo", "Công ty môi giới, giới thiệu việc làm", "Người xin việc trực tiếp đến xin việc", "Tất cả các đáp án trên"], "correct": 3}, {"id": 308, "q": "Câu 308: Sắp xếp các bước tuyển chọn nhân sự:", "choices": ["Xác định yêu cầu công việc, đưa ra tiêu chuẩn của người lao động, thủ tục", "Mô tả công việc, đưa ra tiêu chuẩn của người lao động, xác định yêu cầu", "Xác định yêu cầu công việc, mô tả công việc, đưa ra tiêu chuẩn của người", "Mô tả công việc, đưa ra tiêu chuẩn của người lao động, xác định yêu cầu"], "correct": 2}, {"id": 309, "q": "Câu 309: Đâu là tiêu chuẩn của nhà quản trị viên cấp cao?", "choices": ["Có năng lực tổ chức và định hướng", "Có trình độ về lĩnh vực mà mình phụ trách", "Có kinh nghiệm thực tiễn về công việc được giao", "Có khả năng lựa chọn nhân sự trong bộ phận mình phụ trách"], "correct": 0}, {"id": 310, "q": "Câu 310: Đâu không phải là tiêu chuẩn của nhà quản trị viên trung gian?", "choices": ["Có trình độ về lĩnh vực mà mình phụ trách", "Có khả năng quyết định nhanh, chủ động trong công việc được giao", "Có kinh nghiệm thực tiễn, am hiểu sâu sắc công việc được giao", "Có khả năng tổ chức và biết lựa chọn cán bộ"], "correct": 2}, {"id": 311, "q": "Câu 311: Đâu là hình thức đào tạo nhân viên mà doanh nghiệp sử dụng?", "choices": ["Tại các cơ sở giáo dục chuyên môn như trường Đại học, cơ sở đào tạo", "Khóa học và thực tập ngắn hạn", "Khảo sát doanh nghiệp", "Tất cả các phương án trên"], "correct": 3}, {"id": 312, "q": "Câu 312: Đâu là hình thức đào tạo nhân viên mà doanh nghiệp sử dụng?", "choices": ["Kèm cặp hướng dẫn tại chỗ", "Luân phiên thay đổi công việc", "Phương pháp bài giảng", "Tất cả các phương án trên"], "correct": 3}];

let order = QUESTIONS.map((_,i)=>i);
let i = 0;
let score = 0;
let answered = new Array(QUESTIONS.length).fill(false);
let chosen = new Array(QUESTIONS.length).fill(null);

const qtext = document.getElementById('qtext');
const choices = document.getElementById('choices');
const feedback = document.getElementById('feedback');
const bar = document.getElementById('bar');
const pillProgress = document.getElementById('pillProgress');
const pillScore = document.getElementById('pillScore');
const btnPrev = document.getElementById('btnPrev');
const btnRestart = document.getElementById('btnRestart');

function setProgress() {
  const cur = i+1;
  pillProgress.textContent = `Câu ${cur} / ${QUESTIONS.length}`;
  pillScore.textContent = `Điểm: ${score}`;
  bar.style.width = `${Math.round((cur-1)/QUESTIONS.length*100)}%`;
}

function render() {
  const q = QUESTIONS[order[i]];
  setProgress();
  feedback.textContent = '';
  feedback.className = 'feedback';
  qtext.textContent = `Câu ${q.id}: ${q.q}`;

  choices.innerHTML = '';
  q.choices.forEach((c, idx) => {
    const letter = String.fromCharCode(65 + idx);
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.innerHTML = `<strong>${letter}.</strong> ${c}`;
    btn.onclick = () => pick(idx);
    choices.appendChild(btn);
  });

  // nếu đã trả lời câu này, hiển thị trạng thái
  if (answered[order[i]]) {
    showResult(chosen[order[i]], false);
  }
}

function showResult(pickIdx, autoNext) {
  const q = QUESTIONS[order[i]];
  const correct = q.correct;

  const btns = [...choices.querySelectorAll('button')];
  btns.forEach(b => b.disabled = true);

  if (pickIdx === correct) {
    btns[pickIdx].style.borderColor = 'rgba(34,197,94,.8)';
    btns[pickIdx].style.background = 'rgba(34,197,94,.16)';
    feedback.textContent = 'ĐÚNG ✅';
    feedback.classList.add('ok');
  } else {
    // đáp án chọn sai -> đỏ
    btns[pickIdx].style.borderColor = 'rgba(239,68,68,.85)';
    btns[pickIdx].style.background = 'rgba(239,68,68,.16)';
    // đáp án đúng -> xanh
    btns[correct].style.borderColor = 'rgba(34,197,94,.8)';
    btns[correct].style.background = 'rgba(34,197,94,.16)';
    feedback.textContent = `SAI ❌ (Bạn chọn ${String.fromCharCode(65+pickIdx)} — Đúng là ${String.fromCharCode(65+correct)})`;
    feedback.classList.add('bad');
  }

  // tự chuyển câu
  if (autoNext) {
    setTimeout(() => {
      next();
    }, 650);
  }
}

function pick(idx) {
  const qi = order[i];
  if (answered[qi]) return;

  answered[qi] = true;
  chosen[qi] = idx;

  const q = QUESTIONS[qi];
  if (idx === q.correct) score += 1;

  showResult(idx, true);
  pillScore.textContent = `Điểm: ${score}`;
}

function next() {
  if (i < QUESTIONS.length - 1) {
    i++;
    render();
  } else {
    endScreen();
  }
}

function prev() {
  if (i > 0) {
    i--;
    render();
  }
}

function endScreen() {
  const total = QUESTIONS.length;
  const pct = Math.round((score/total)*100);
  document.getElementById('card').innerHTML = `
    <div class="end">
      <div class="big">${score} / ${total}</div>
      <h2>Hoàn thành 🎉</h2>
      <div class="small">Tỷ lệ đúng: ${pct}%</div>
      <div style="margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="primary" onclick="restart()">Làm lại</button>
        <button class="ghost" onclick="reviewWrong()">Ôn lại câu sai</button>
      </div>
    </div>
  `;
  bar.style.width = '100%';
}

function restart() {
  i = 0;
  score = 0;
  answered = new Array(QUESTIONS.length).fill(false);
  chosen = new Array(QUESTIONS.length).fill(null);
  // reload layout
  location.reload();
}

function reviewWrong() {
  // tạo danh sách câu sai
  const wrong = [];
  for (let k=0;k<QUESTIONS.length;k++) {
    if (answered[k] && chosen[k] !== QUESTIONS[k].correct) wrong.push(k);
  }
  if (wrong.length === 0) {
    alert('Bạn không có câu sai nào để ôn lại 👍');
    return;
  }
  order = wrong;
  i = 0;
  score = 0; // điểm ở chế độ ôn không quan trọng
  // rebuild original card layout quickly
  location.reload();
}

btnPrev.addEventListener('click', prev);
btnRestart.addEventListener('click', () => restart());

render();
</script>
